<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Xác nhận trạng thái khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { height: 100vh; background-color: #2f4050; color: #fff; padding: 20px; }
        .sidebar a { color: #cfd8dc; display: block; padding: 10px; text-decoration: none; margin-bottom: 5px; }
        .sidebar a:hover { background-color: #1c2b36; border-radius: 5px; }
        .profile { text-align: center; margin-bottom: 20px; }
        .profile img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #ddd; }
        .content { padding: 20px; }
        .topbar { background-color: white; padding: 10px 20px; margin-bottom: 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .table thead th { background-color: #dc3545; color: white; vertical-align: middle; }
        .table tbody td { vertical-align: middle; }
        .form-select-sm { min-width: 120px; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <div class="profile">
                <img th:src="@{/images/admin_avatar.png}" alt="Admin Avatar">
                <h6 class="mt-2">Admin</h6>
            </div>
            <a th:href="@{/admin/dashboard}"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a th:href="@{/admin/users}" class="active"><i class="fa-solid fa-users-cog"></i> Users</a>
            <a th:href="@{/admin/cars}"><i class="fa-solid fa-car"></i> Cars</a>
            <a th:href="@{/admin/complaints}"><i class="fa-solid fa-exclamation-triangle"></i> Complaints</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10">
            <div class="topbar">
                <h4><i class="fas fa-user-check me-2"></i> Xác nhận trạng thái khách hàng</h4>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-outline-danger">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </button>
                </form>
            </div>

            <div class="content">
                <!-- Alert messages -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle me-2"></i> <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Table users -->
                <div class="table-responsive">
                    <table class="table table-hover table-striped">
                        <thead>
                        <tr>
                            <th>Email</th>
                            <th>Vai trò</th>
                            <th>KYC Status</th>
                            <th>Trạng thái</th>
                            <th class="text-center">Hành động</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.email}"></td>
                            <td th:text="${user.role}"></td>

                            <!-- KYC Status -->
                            <td>
                                <form th:action="@{/admin/users/change-kyc/{id}(id=${user.id})}" method="post" th:if="${user.profile != null}">
                                    <select name="newKycStatus" class="form-select form-select-sm">
                                        <option value="PENDING" th:selected="${user.profile.kycStatus == 'PENDING'}">Đang chờ</option>
                                        <option value="VERIFIED" th:selected="${user.profile.kycStatus == 'VERIFIED'}">Đã xác minh</option>
                                        <option value="REJECTED" th:selected="${user.profile.kycStatus == 'REJECTED'}">Từ chối</option>
                                    </select>
                                    <button type="submit" class="btn btn-primary btn-sm mt-1">Cập nhật</button>
                                </form>
                                <span th:if="${user.profile == null}">Chưa có KYC</span>
                            </td>

                            <!-- Active Status -->
                            <td>
                                <span th:if="${user.isActive}" class="badge bg-success">Đang hoạt động</span>
                                <span th:unless="${user.isActive}" class="badge bg-secondary">Đã khóa</span>
                            </td>

                            <!-- Toggle Active -->
                            <td class="text-center">
                                <form th:action="@{/admin/users/toggle-active/{id}(id=${user.id})}" method="post">
                                    <button th:if="${user.isActive}" type="submit" class="btn btn-danger btn-sm"
                                            onclick="return confirm('Bạn chắc chắn muốn KHÓA user này?')">
                                        <i class="fas fa-lock"></i> Khóa
                                    </button>
                                    <button th:unless="${user.isActive}" type="submit" class="btn btn-success btn-sm"
                                            onclick="return confirm('Bạn chắc chắn muốn MỞ KHÓA user này?')">
                                        <i class="fas fa-lock-open"></i> Mở khóa
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${users.empty}">
                            <td colspan="5" class="text-center py-4">
                                <i class="fas fa-info-circle me-2"></i> Hệ thống chưa có khách hàng nào.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
