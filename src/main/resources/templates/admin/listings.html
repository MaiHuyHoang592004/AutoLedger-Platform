<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý bài đăng - Chờ duyệt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
</head>
<body>
    <header th:replace="~{fragments/header :: header}"></header>

    <div class="container content-wrapper my-5">
        <h1 class="mb-4"><i class="fas fa-clipboard-check me-2"></i> Danh sách bài đăng chờ duyệt</h1>

        <!-- Thông báo thành công/lỗi -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Bảng danh sách bài đăng -->
        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Tiêu đề</th>
                        <th>Xe</th>
                        <th>Giá/24h (VNĐ)</th>
                        <th>Giới hạn km/24h</th>
                        <th>Thành phố</th>
                        <th>Ngày tạo</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="listing : ${listings}">
                        <td th:text="${listing.id}"></td>
                        <td th:text="${listing.title}"></td>
                        <td>
                            <span th:text="${listing.make + ' ' + listing.model + ' (' + listing.year + ')'}"></span>
                        </td>
                        <td th:text="${#numbers.formatInteger(listing.price24hCents, 0, 'POINT')}"></td>
                        <td th:text="${listing.kmLimit24h}"></td>
                        <td th:text="${listing.homeCity}"></td>
                        <td th:text="${#temporals.format(listing.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <form th:action="@{/admin/listings/approve/{id}(id=${listing.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-success btn-sm">
                                    <i class="fas fa-check me-1"></i> Duyệt
                                </button>
                            </form>
                            <form th:action="@{/admin/listings/reject/{id}(id=${listing.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Bạn chắc chắn muốn từ chối bài đăng này?');">
                                    <i class="fas fa-times me-1"></i> Từ chối
                                </button>
                            </form>
                            <a th:href="@{/admin/listings/view/{id}(id=${listing.id})}" class="btn btn-info btn-sm">
                                <i class="fas fa-eye me-1"></i> Xem chi tiết
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(listings)}">
                        <td colspan="8" class="text-center text-muted">Không có bài đăng nào chờ duyệt.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Phân trang nếu cần -->
        <!-- Thêm logic phân trang nếu danh sách dài -->

    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
