<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách bài đăng chờ duyệt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>

<div class="container content-wrapper mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="fas fa-clipboard-list me-2"></i> Bài đăng chờ duyệt</h1>
        <a th:href="@{/admin}" class="btn btn-secondary"><i class="fas fa-arrow-left me-1"></i> Quay lại</a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Xe</th>
                        <th>Tiêu đề</th>
                        <th>Giá 24h (VNĐ)</th>
                        <th>Chủ xe</th>
                        <th>Ngày tạo</th>
                        <th class="text-center">Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="listing : ${listings}" th:if="${!#lists.isEmpty(listings)}">
                        <td th:text="${listing.id}"></td>
                        <td th:text="${listing.make + ' ' + listing.model + ' (' + listing.year + ')'}"></td>
                        <td th:text="${listing.title}"></td>
                        <td th:text="${#numbers.formatInteger(listing.price24hCents, 0, 'DEFAULT')}"></td>
                        <td th:text="${listing.ownerEmail}"></td>
                        <td th:text="${#temporals.format(listing.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td class="text-center">
                            <a th:href="@{/admin/listings/view/{id}(id=${listing.id})}" class="btn btn-info btn-sm" title="Xem chi tiết">
                                <i class="fas fa-eye"></i>
                            </a>
                            <form th:action="@{/admin/listings/approve/{id}(id=${listing.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-success btn-sm" title="Duyệt" onclick="return confirm('Duyệt bài đăng này?')">
                                    <i class="fas fa-check"></i>
                                </button>
                            </form>
                            <form th:action="@{/admin/listings/reject/{id}(id=${listing.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-danger btn-sm" title="Từ chối" onclick="return confirm('Từ chối bài đăng này?')">
                                    <i class="fas fa-times"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(listings)}">
                        <td colspan="7" class="text-center py-4 text-muted">
                            <i class="fas fa-inbox fa-2x mb-2"></i><br>
                            Không có bài đăng nào đang chờ duyệt.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
