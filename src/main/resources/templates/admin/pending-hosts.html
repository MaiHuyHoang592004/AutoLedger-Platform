<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyệt Host - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <h2><i class="fas fa-user-check me-2"></i>Duyệt yêu cầu làm Host</h2>
                <p class="text-muted">Quản lý các yêu cầu đăng ký trở thành host</p>

                <!-- Success/Error Messages -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Back to Admin Panel -->
                <div class="mb-3">
                    <a href="/admin/users" class="btn btn-secondary">
                        <i class="fas fa-arrow-left me-1"></i>Quay lại quản lý người dùng
                    </a>
                </div>

                <!-- Pending Hosts Table -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Danh sách yêu cầu đang chờ duyệt</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(pendingHosts)}" class="text-center py-5">
                            <i class="fas fa-check-circle text-success" style="font-size: 3rem;"></i>
                            <h5 class="mt-3">Không có yêu cầu nào đang chờ duyệt</h5>
                            <p class="text-muted">Tất cả yêu cầu làm host đã được xử lý</p>
                        </div>

                        <div th:if="${!#lists.isEmpty(pendingHosts)}">
                            <div class="table-responsive">
                                <table class="table table-striped table-hover">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>ID</th>
                                            <th>Email</th>
                                            <th>Tên đầy đủ</th>
                                            <th>Số điện thoại</th>
                                            <th>Ngày đăng ký</th>
                                            <th>Thao tác</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="user : ${pendingHosts}">
                                            <td th:text="${user.id}"></td>
                                            <td th:text="${user.email}"></td>
                                            <td th:text="${user.profile?.fullName ?: 'N/A'}"></td>
                                            <td th:text="${user.phone ?: 'N/A'}"></td>
                                            <td th:text="${#dates.format(user.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                                            <td>
                                                <div class="btn-group" role="group">
                                                    <!-- Approve Button -->
                                                    <form th:action="@{'/admin/hosts/' + ${user.id} + '/approve'}" method="post" class="d-inline"
                                                          onsubmit="return confirm('Bạn có chắc muốn duyệt user này làm host?')">
                                                        <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                                                        <button type="submit" class="btn btn-success btn-sm">
                                                            <i class="fas fa-check me-1"></i>Duyệt
                                                        </button>
                                                    </form>

                                                    <!-- Reject Button -->
                                                    <form th:action="@{'/admin/hosts/' + ${user.id} + '/reject'}" method="post" class="d-inline ms-1"
                                                          onsubmit="return confirm('Bạn có chắc muốn từ chối yêu cầu này?')">
                                                        <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                                                        <button type="submit" class="btn btn-danger btn-sm">
                                                            <i class="fas fa-times me-1"></i>Từ chối
                                                        </button>
                                                    </form>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Statistics Card -->
                <div class="row mt-4">
                    <div class="col-md-4">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5 class="card-title text-warning">
                                    <i class="fas fa-clock"></i>
                                </h5>
                                <h3 class="card-text" th:text="${#lists.size(pendingHosts)}"></h3>
                                <p class="card-text">Đang chờ duyệt</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
